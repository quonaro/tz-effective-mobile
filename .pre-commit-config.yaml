repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: bash -c 'cd backend && golangci-lint run ./...'
        language: system
        files: ^backend/.*\.go$
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: bash -c 'cd frontend && pnpm exec prettier --check .'
        language: system
        files: ^frontend/.*\.(vue|ts|js|css|json|md)$
        pass_filenames: false

      - id: oxlint
        name: oxlint
        entry: bash -c 'cd frontend && pnpm exec oxlint .'
        language: system
        files: ^frontend/.*\.(vue|ts|js)$
        pass_filenames: false
