name: Build and Release

on:
  push:
    branches:
    - main

env:
  BACKEND_IMAGE: tz-backend
  FRONTEND_IMAGE: tz-frontend

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build backend image
      run: |
        docker build -t ${{ env.BACKEND_IMAGE }}:latest ./backend

    - name: Build frontend image
      run: |
        docker build -t ${{ env.FRONTEND_IMAGE }}:latest ./frontend

    - name: Prepare release artifacts
      run: |
        export DIST_DIR=/tmp/dist
        mkdir -p $DIST_DIR

        # Save images
        docker save ${{ env.BACKEND_IMAGE }}:latest | gzip > $DIST_DIR/${{ env.BACKEND_IMAGE }}.tar.gz
        docker save ${{ env.FRONTEND_IMAGE }}:latest | gzip > $DIST_DIR/${{ env.FRONTEND_IMAGE }}.tar.gz

        # Generate install.sh
        cat > $DIST_DIR/install.sh << 'EOF'
        #!/bin/bash
        set -e

        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        BACKEND_IMAGE="tz-backend"
        FRONTEND_IMAGE="tz-frontend"

        echo "Loading Docker images..."

        if [ -f "$SCRIPT_DIR/${BACKEND_IMAGE}.tar.gz" ]; then
            echo "Loading backend image..."
            gunzip -c "$SCRIPT_DIR/${BACKEND_IMAGE}.tar.gz" | docker load
        else
            echo "Error: ${BACKEND_IMAGE}.tar.gz not found"
            exit 1
        fi

        if [ -f "$SCRIPT_DIR/${FRONTEND_IMAGE}.tar.gz" ]; then
            echo "Loading frontend image..."
            gunzip -c "$SCRIPT_DIR/${FRONTEND_IMAGE}.tar.gz" | docker load
        else
            echo "Error: ${FRONTEND_IMAGE}.tar.gz not found"
            exit 1
        fi

        echo "Images loaded successfully!"
        echo ""
        echo "To run the application:"
        echo "  docker compose up -d"
        echo ""
        echo "Or with custom .env file:"
        echo "  docker compose --env-file .env up -d"
        EOF
        chmod +x $DIST_DIR/install.sh

        # Generate docker-compose.yml
        echo '' | base64 -d > $DIST_DIR/docker-compose.yml

        # Copy supporting files
        cp Caddyfile.container $DIST_DIR/Caddyfile
        cp .env.example $DIST_DIR/.env.example
        cp .env.example $DIST_DIR/.env
        cp .gitignore $DIST_DIR/.gitignore
        mkdir -p $DIST_DIR/migrations
        cp -r backend/internal/migrations/* $DIST_DIR/migrations/ 2>/dev/null || echo "No migrations found"

    - name: Update prod branch
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Create or checkout prod branch (orphan to have clean history)
        git checkout --orphan prod

        # Remove all tracked files
        git rm -rf . || true

        # Add built artifacts
        cp -r /tmp/dist/. .

        # Add files to git
        git add -A
        git commit -m "chore(release): build images from main @ $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"

        # Push to prod branch
        git push origin prod --force
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
